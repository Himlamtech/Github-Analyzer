global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: github_analyzer_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:9091"]
        labels:
          service: api

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
