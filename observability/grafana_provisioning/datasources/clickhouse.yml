apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse_ds
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      server: clickhouse
      port: 8123
      username: github_analyzer
      defaultDatabase: github_analyzer
      tlsSkipVerify: true
      protocol: http
    secureJsonData:
      password: github_analyzer
