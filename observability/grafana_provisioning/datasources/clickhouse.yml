apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse_ds
    access: proxy
    url: http://clickhouse:8123
    editable: false
    jsonData:
      defaultDatabase: github_analyzer
      port: 8123
      protocol: http
      server: clickhouse
      username: ${CLICKHOUSE_USER}
      tlsSkipVerify: true
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
