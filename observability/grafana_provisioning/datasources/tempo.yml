apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo_ds
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      serviceMap:
        datasourceUid: prometheus_ds
      spanBar:
        tag: http.route
        type: Tag
      streamingEnabled:
        search: true
      traceQuery:
        spanEndTimeShift: 5m
        spanStartTimeShift: -5m
        timeShiftEnabled: true
      tracesToLogsV2:
        customQuery: true
        datasourceUid: loki_ds
        filterBySpanID: false
        filterByTraceID: true
        query: '{compose_service=~".+"} |= "$${__trace.traceId}"'
        spanEndTimeShift: 2m
        spanStartTimeShift: -2m
        tags:
          - key: service.name
            value: compose_service
          - key: http.route
            value: route
      tracesToMetrics:
        datasourceUid: prometheus_ds
        queries:
          - name: API Request Rate
            query: 'sum by (route) (rate(api_requests_total{$$__tags}[10s]))'
          - name: API Latency P95
            query: 'histogram_quantile(0.95, sum by (le, route) (rate(api_request_duration_seconds_bucket{$$__tags}[30s])))'
          - name: Business Freshness
            query: 'max(data_freshness_seconds{job="github_analyzer_api"})'
          - name: Kafka Produced 10s
            query: 'sum(rate(kafka_messages_produced_total{job="github_analyzer_poller"}[10s]))'
          - name: Spark Processed 10s
            query: 'sum(rate(spark_records_processed_total{job="github_analyzer_processor",sink="clickhouse"}[10s]))'
          - name: Spark Fracture Gap
            query: 'clamp_min(sum(rate(kafka_messages_produced_total{job="github_analyzer_poller"}[10s])) - sum(rate(spark_records_processed_total{job="github_analyzer_processor",sink="clickhouse"}[10s])), 0)'
        spanEndTimeShift: 5m
        spanStartTimeShift: -5m
        tags:
          - key: http.method
            value: method
          - key: http.route
            value: route
          - key: service.name
            value: service
