apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo_ds
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      serviceMap:
        datasourceUid: prometheus_ds
      spanBar:
        tag: http.route
        type: Tag
      streamingEnabled:
        search: true
      traceQuery:
        spanEndTimeShift: 1h
        spanStartTimeShift: -1h
        timeShiftEnabled: true
      tracesToLogsV2:
        customQuery: true
        datasourceUid: loki_ds
        filterBySpanID: false
        filterByTraceID: true
        query: '{compose_service=~".+"} |= "$${__trace.traceId}"'
        spanEndTimeShift: 10m
        spanStartTimeShift: -10m
        tags:
          - key: service.name
            value: compose_service
          - key: http.route
            value: route
      tracesToMetrics:
        datasourceUid: prometheus_ds
        queries:
          - name: API Request Rate
            query: 'sum by (route) (rate(api_requests_total{$$__tags}[5m]))'
          - name: API Latency P95
            query: 'histogram_quantile(0.95, sum by (le, route) (rate(api_request_duration_seconds_bucket{$$__tags}[5m])))'
        spanEndTimeShift: 15m
        spanStartTimeShift: -15m
        tags:
          - key: http.method
            value: method
          - key: http.route
            value: route
          - key: service.name
            value: service
