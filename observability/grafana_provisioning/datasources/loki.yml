apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki_ds
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - datasourceUid: tempo_ds
          matcherRegex: 'trace_id=([0-9a-f]{32})'
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: 'View trace'
