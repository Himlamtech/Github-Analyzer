apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki_ds
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # Extract trace IDs from logs so Grafana can jump from logs to Tempo traces.
      derivedFields:
        - datasourceUid: tempo_ds
          matcherRegex: 'trace[_-]id[=": ]+([0-9a-f]{32})'
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: View trace
